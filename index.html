<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RF Bit Tools</title>
<link rel="stylesheet" href="converter.css">
</head>
<body>
<h2>RF / Manchester Conversion Utility</h2>
<div class="section">
    <h3>Input</h3>
    <textarea id="binaryInput"></textarea>
    <br>
    <label>Convert from:</label>
    <select id="convertIp" class="small-select">
        <option value="0">Auto</option>
        <option value="1">binary</option>
        <option value="2">hex</option>
    </select>
    <label>Convert to:</label>
    <select id="convertOp" class="small-select">
        <option value="0">Auto</option>
        <option value="1">binary</option>
        <option value="2">hex</option>
    </select>
    <br>
    <label>Shift Level:</label>
    <select id="shiftLvl" class="small-select">
        <option value="0">0</option>
        <option value="1">1</option>
    </select>
    <label>Shift Direction:</label>
    <select id="shiftDir" class="small-select">
        <option value="0">Left</option>
        <option value="1">Right</option>
    </select>
    <br>
    <label>Manchester Convention:</label>
        <select id="manchesterMode" class="small-select">
        <option value="1">Manchester 1 (01=1, 10=0)</option>
        <option value="2">Manchester 2 (10=1, 01=0)</option>
    </select>
    <br>
    <label>Differential Manchester Initial Level:</label>
    <select id="diffInit" class="small-select">
        <option value="0">0</option>
        <option value="1">1</option>
    </select>
    <h3>Actions</h3>
    <button id="convertBtn" onclick="convert()">Convert</button>
    <button onclick="shiftBits()">Shift Bits</button>
    <button onclick="decodeManchester()">Decode Manchester</button>
    <button onclick="decodeDiffManchester()">Decode Differential Manchester</button>
    <button onclick="encodeManchester()">Encode Manchester</button>
    <button onclick="encodeDiffManchester()">Encode Differential Manchester</button>
    <h3>Results</h3>
    <div class="output" id="output"></div>
</div>
<script src="converter.js"></script>
</body>
</html>
